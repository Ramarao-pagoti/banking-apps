name: Accounts CI

on:
  push:
    branches:
      - main
    paths:
      - 'accounts-service/**'
      - '.github/workflows/accounts-ci.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: accounts-ci
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  ACCOUNTS_ECR_REPOSITORY: ${{ vars.ACCOUNTS_ECR_REPOSITORY }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t $ACCOUNTS_ECR_REPOSITORY:${{ github.sha }} \
            ./accounts-service

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACCOUNTS_ECR_REPOSITORY }}:${{ github.sha }}

      - name: Tag Image
        run: |
          docker tag \
            $ACCOUNTS_ECR_REPOSITORY:${{ github.sha }} \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ACCOUNTS_ECR_REPOSITORY:${{ github.sha }}

      - name: Push Image
        run: |
          docker push \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ACCOUNTS_ECR_REPOSITORY:${{ github.sha }}

  update-manifest:
    needs: build-scan-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Platform Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PLATFORM_REPO }}
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          path: platform-repo

      - name: Update Image Tag
        env:
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          ACCOUNTS_ECR_REPOSITORY: ${{ vars.ACCOUNTS_ECR_REPOSITORY }}
        run: |
          sed -i "s|image: .*|image: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ACCOUNTS_ECR_REPOSITORY:$IMAGE_TAG|g" \
          platform-repo/applications/accounts-service/deployment.yaml

      - name: Commit Changes
        run: |
          cd platform-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add applications/accounts-service/deployment.yaml

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "Deploy accounts-service image ${{ github.sha }}"

      - name: Push Changes
        run: |
          cd platform-repo
          git push origin main
